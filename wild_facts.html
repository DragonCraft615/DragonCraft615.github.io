<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragonia — Wild Facts Quiz</title>
<style>
  :root {
    --bg:#0a0a14;
    --surface:#0f0f1e;
    --card:#131325;
    --hover:#1a1a35;
    --accent:#e94560;
    --gold:#f5a623;
    --green:#2ecc71;
    --red:#e74c3c;
    --correct:#1e8449;
    --wrong:#922b21;
    --text:#f0ede6;
    --sub:#a89880;
    --muted:#5c5248;
    --border:#1e1a2e;
    --teal:#1abc9c;
    --scale-line: rgba(245,166,35,.04);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background-color:var(--bg);background-image:radial-gradient(ellipse 65% 32% at 50% -4%,rgba(245,107,26,.18) 0%,transparent 70%),radial-gradient(ellipse 48% 26% at 92% 105%,rgba(192,57,43,.14) 0%,transparent 65%),repeating-linear-gradient(60deg,var(--scale-line) 0,var(--scale-line) 1px,transparent 1px,transparent 28px),repeating-linear-gradient(-60deg,var(--scale-line) 0,var(--scale-line) 1px,transparent 1px,transparent 28px);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;}
  a{color:var(--sub);text-decoration:none;}
  a:hover{color:var(--text);}
  .wrap{width:100%;max-width:660px;}

  /* Header */
  .site-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 24px;}
  .back-link{font-size:14px;color:var(--sub);display:flex;align-items:center;gap:6px;transition:color .2s;}
  .back-link:hover{color:var(--text);}
  .header-title{font-size:22px;font-weight:700;text-align:center;flex:1;}
  .score-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:14px;font-weight:600;color:var(--gold);white-space:nowrap;}

  /* Progress dots */
  .progress-dots{display:flex;gap:8px;justify-content:center;margin-bottom:20px;}
  .dot{width:28px;height:8px;border-radius:4px;background:var(--border);transition:background .3s;}
  .dot.done{background:var(--teal);}
  .dot.current{background:var(--gold);}

  /* Category badge */
  .cat-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.5px;margin-bottom:14px;}

  /* Question card */
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 24px 20px;margin-bottom:16px;}
  .question-text{font-size:20px;font-weight:700;line-height:1.4;color:var(--text);}

  /* Options grid */
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .opt-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-weight:600;padding:14px 12px;cursor:pointer;transition:background .15s,border-color .15s,opacity .25s;text-align:center;line-height:1.3;}
  .opt-btn:hover:not(:disabled){background:var(--hover);border-color:#3a5570;}
  .opt-btn.correct{background:var(--correct);border-color:var(--green);}
  .opt-btn.wrong{background:var(--wrong);border-color:var(--red);}
  .opt-btn.dim{opacity:.35;}
  .opt-btn:disabled{cursor:default;}

  /* Feedback */
  .feedback{border-radius:12px;padding:14px 18px;font-size:15px;font-weight:600;text-align:center;min-height:52px;transition:opacity .3s;margin-bottom:0;}
  .feedback.hidden{opacity:0;pointer-events:none;}
  .feedback.correct-fb{background:rgba(30,132,73,.25);border:1px solid var(--correct);color:var(--green);}
  .feedback.wrong-fb{background:rgba(146,43,33,.25);border:1px solid var(--wrong);color:#f1948a;}
  .wow-fact{color:var(--teal);font-size:13px;font-weight:500;text-align:center;margin-top:10px;line-height:1.5;min-height:20px;transition:opacity .3s;}
  .wow-fact.hidden{opacity:0;}

  /* End card */
  .end-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;text-align:center;display:none;}
  .end-card.show{display:block;}
  .end-title{font-size:24px;font-weight:700;margin-bottom:8px;}
  .end-score{font-size:72px;font-weight:900;line-height:1;margin:12px 0;}
  .end-label{font-size:16px;color:var(--sub);margin-bottom:18px;}
  .end-msg{font-size:17px;font-weight:600;line-height:1.5;margin-bottom:24px;}
  .result-dots{display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
  .r-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .r-dot.c{background:var(--correct);}
  .r-dot.w{background:var(--wrong);}
  .end-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .btn-play{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s;}
  .btn-play:hover{opacity:.85;}
  .btn-back{background:var(--card);color:var(--sub);border:1px solid var(--border);border-radius:12px;padding:14px 28px;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:background .2s;}
  .btn-back:hover{background:var(--hover);color:var(--text);}

  /* Game area */
  #game-area{display:block;}

  @media(max-width:480px){
    .options-grid{grid-template-columns:1fr;}
    .question-text{font-size:17px;}
    .end-score{font-size:56px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <a class="back-link" href="quiz-games.html">← Dragonia</a>
    <span class="header-title">🧠 Wild Facts Quiz</span>
    <span class="score-pill" id="score-pill">Score: 0</span>
  </header>

  <div id="game-area">
    <div class="progress-dots" id="progress-dots"></div>
    <div style="text-align:center;">
      <span class="cat-badge" id="cat-badge"></span>
    </div>
    <div class="question-card">
      <div class="question-text" id="question-text"></div>
    </div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback hidden" id="feedback"></div>
    <div class="wow-fact hidden" id="wow-fact"></div>
  </div>

  <div class="end-card" id="end-card">
    <div class="end-title">Quiz Complete!</div>
    <div class="end-score" id="end-score"></div>
    <div class="end-label">out of 10</div>
    <div class="end-msg" id="end-msg"></div>
    <div class="result-dots" id="result-dots"></div>
    <div class="end-btns">
      <button class="btn-play" onclick="startGame()">🔄 Play Again</button>
      <a class="btn-back" href="quiz-games.html">← Dragonia</a>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  {q:"Which is the fastest land animal?",a:"Cheetah",w:["Lion","Horse","Greyhound"],fact:"🐆 Cheetahs reach 70 mph in just 3 seconds — faster than most sports cars!",cat:"🐾 Animals"},
  {q:"Which is the largest animal that has ever lived on Earth?",a:"Blue Whale",w:["African Elephant","Polar Bear","Giant Squid"],fact:"🐋 A blue whale's heart is as big as a small car and beats just 2 times per minute!",cat:"🐾 Animals"},
  {q:"How many hearts does an octopus have?",a:"3",w:["1","2","4"],fact:"🐙 An octopus has 3 hearts AND blue blood — it's basically an alien from the deep!",cat:"🐾 Animals"},
  {q:"Which is the only mammal that can truly fly?",a:"Bat",w:["Flying Squirrel","Sugar Glider","Colugo"],fact:"🦇 Flying squirrels can only glide — bats are the ONLY true flying mammals!",cat:"🐾 Animals"},
  {q:"How many legs does a spider have?",a:"8",w:["6","10","12"],fact:"🕷️ Easy trick: insects = 6 legs, spiders = 8. That's how you tell them apart!",cat:"🐾 Animals"},
  {q:"Which animal is famous for having an incredible memory?",a:"Elephant",w:["Dolphin","Crow","Chimpanzee"],fact:"🐘 Elephants can remember the faces of hundreds of friends — even after 20 years apart!",cat:"🐾 Animals"},
  {q:"Which bird is the fastest swimmer?",a:"Penguin",w:["Duck","Pelican","Cormorant"],fact:"🐧 Gentoo penguins swim at 22 mph — faster than most humans can run on land!",cat:"🐾 Animals"},
  {q:"What do giant pandas mostly eat?",a:"Bamboo",w:["Fish","Berries","Insects"],fact:"🐼 Giant pandas eat up to 40 pounds of bamboo daily — like eating 200 sandwiches!",cat:"🐾 Animals"},
  {q:"Which animal can change its skin colour?",a:"Chameleon",w:["Gecko","Iguana","Komodo Dragon"],fact:"🦎 Chameleons don't just camouflage — they change colour to show their mood too!",cat:"🐾 Animals"},
  {q:"Which animal can regrow a completely lost limb?",a:"Starfish",w:["Crab","Lobster","Clam"],fact:"⭐ Some starfish can regrow their WHOLE body from just one arm. Unstoppable!",cat:"🐾 Animals"},
  {q:"How many eyes does a honey bee have?",a:"5",w:["2","3","6"],fact:"🐝 Bees have 2 large compound eyes AND 3 tiny simple eyes on top of their head!",cat:"🐾 Animals"},
  {q:"Which is the slowest mammal?",a:"Three-toed Sloth",w:["Koala","Hedgehog","Giant Tortoise"],fact:"🦥 Sloths move so slowly that algae grows on their fur — they're their own tiny ecosystem!",cat:"🐾 Animals"},
  {q:"Which animal produces silk to build webs and traps?",a:"Spider",w:["Moth","Beetle","Ant"],fact:"🕸️ Spider silk is stronger than steel of the same thickness — scientists want to copy it for body armour!",cat:"🐾 Animals"},
  {q:"Which is the tallest living animal?",a:"Giraffe",w:["Elephant","Camel","Ostrich"],fact:"🦒 A giraffe's neck alone can be 6 feet long — and it has the same 7 neck bones as humans!",cat:"🐾 Animals"},
  {q:"Which is the largest planet in our solar system?",a:"Jupiter",w:["Saturn","Uranus","Neptune"],fact:"🪐 Jupiter is SO huge that all the other planets could fit inside it with room to spare!",cat:"🚀 Space"},
  {q:"How many planets are in our solar system?",a:"8",w:["7","9","10"],fact:"🚀 Poor Pluto! It was demoted from planet to 'dwarf planet' in 2006 — scientists still argue!",cat:"🚀 Space"},
  {q:"Which planet is closest to the Sun?",a:"Mercury",w:["Venus","Earth","Mars"],fact:"☀️ A year on Mercury lasts just 88 Earth days — your birthday comes round nearly 4 times a year!",cat:"🚀 Space"},
  {q:"Which is the hottest planet in our solar system?",a:"Venus",w:["Mercury","Mars","Jupiter"],fact:"🔥 Venus beats Mercury despite being further from the Sun — its clouds trap heat like an oven at 465°C!",cat:"🚀 Space"},
  {q:"How long does light from the Sun take to reach Earth?",a:"About 8 minutes",w:["About 1 second","About 1 hour","About 1 day"],fact:"💡 Light travels 186,000 miles per second — and it STILL takes 8 whole minutes to reach us!",cat:"🚀 Space"},
  {q:"Which planet spins completely tilted on its side?",a:"Uranus",w:["Saturn","Neptune","Mars"],fact:"🌀 Scientists think a massive rock crashed into Uranus billions of years ago and knocked it sideways!",cat:"🚀 Space"},
  {q:"What is a shooting star really made of?",a:"A rock or speck of dust burning up",w:["A dying star","A comet's tail","A satellite"],fact:"⭐ Shooting stars aren't stars at all — tiny space rocks burn up in our atmosphere at 40,000 mph!",cat:"🚀 Space"},
  {q:"Which planet has the most moons?",a:"Saturn",w:["Jupiter","Uranus","Neptune"],fact:"🪐 Saturn has 146 known moons — including Titan, which has its own thick atmosphere!",cat:"🚀 Space"},
  {q:"How many bones are in the adult human body?",a:"206",w:["106","256","300"],fact:"🦴 Babies are born with about 270 bones — they gradually fuse together as you grow up!",cat:"🧬 Human Body"},
  {q:"Which is the largest organ in the human body?",a:"Skin",w:["Liver","Brain","Lungs"],fact:"🫁 Your skin stretches about 2 square metres and weighs 3–4 kg. It's your armour against the world!",cat:"🧬 Human Body"},
  {q:"How many chambers does the human heart have?",a:"4",w:["2","3","6"],fact:"❤️ Your heart beats about 100,000 times every single day — over 2.5 billion beats in a lifetime!",cat:"🧬 Human Body"},
  {q:"How long is the human small intestine?",a:"About 6–7 metres",w:["About 1 metre","About 3 metres","About 15 metres"],fact:"🌀 Your small intestine is coiled up tightly — if unrolled it'd be taller than a double-decker bus!",cat:"🧬 Human Body"},
  {q:"Which part of the body keeps growing throughout your whole life?",a:"Ears and nose",w:["Fingers","Eyes","Teeth"],fact:"👃 Ears and noses never stop growing — that's why older people tend to have larger ones!",cat:"🧬 Human Body"},
  {q:"How many taste buds does a human tongue have?",a:"About 10,000",w:["About 100","About 1,000","About 100,000"],fact:"👅 Each taste bud lives only about 10 days before it's replaced — your mouth constantly refreshes!",cat:"🧬 Human Body"},
  {q:"What is the tallest mountain on Earth?",a:"Mount Everest",w:["K2","Mont Blanc","Kilimanjaro"],fact:"⛰️ Mount Everest is 8,849 metres tall — and it's still growing about 4mm taller every year!",cat:"🌍 Earth"},
  {q:"Which is the largest ocean on Earth?",a:"Pacific Ocean",w:["Atlantic Ocean","Indian Ocean","Arctic Ocean"],fact:"🌊 The Pacific Ocean is so vast that all the continents combined could fit inside it with room to spare!",cat:"🌍 Earth"},
  {q:"How many continents are there on Earth?",a:"7",w:["5","6","8"],fact:"🌍 Africa, Antarctica, Asia, Australia, Europe, North America, South America — name them all!",cat:"🌍 Earth"},
  {q:"Which is the largest country in the world by area?",a:"Russia",w:["China","USA","Canada"],fact:"🌏 Russia spans 11 time zones — when it's midnight in one part, it's midday in another!",cat:"🌍 Earth"},
  {q:"Which is the smallest country in the world?",a:"Vatican City",w:["Monaco","San Marino","Nauru"],fact:"🏛️ Vatican City is smaller than most theme parks — yet it has its own bank, post office and army!",cat:"🌍 Earth"},
  {q:"What percentage of Earth's surface is covered by water?",a:"About 71%",w:["About 50%","About 60%","About 85%"],fact:"🌊 97% of all that water is salty ocean — only 3% is the fresh water we can drink!",cat:"🌍 Earth"},
  {q:"Which country has the most people in the world?",a:"India",w:["China","USA","Indonesia"],fact:"🌏 India overtook China as the world's most populous country in 2023 with over 1.4 billion people!",cat:"🌍 Earth"},
  {q:"How many colours are in a rainbow?",a:"7",w:["5","6","8"],fact:"🌈 Red, Orange, Yellow, Green, Blue, Indigo, Violet — remember them with ROY G BIV!",cat:"🔬 Science"},
  {q:"What is the fastest thing in the universe?",a:"Light",w:["Sound","Electricity","Gravity"],fact:"💡 Light travels 186,000 miles per SECOND — it could circle the Earth 7 times in just one second!",cat:"🔬 Science"},
  {q:"What gas makes fizzy drinks fizzy?",a:"Carbon dioxide",w:["Oxygen","Nitrogen","Hydrogen"],fact:"🫧 CO₂ is pumped into drinks under pressure — when you open the bottle, it all rushes out. Pop!",cat:"🔬 Science"},
  {q:"What is the most common gas in Earth's atmosphere?",a:"Nitrogen",w:["Oxygen","Carbon dioxide","Argon"],fact:"💨 Earth's air is 78% nitrogen and 21% oxygen — most people guess oxygen, but nitrogen wins!",cat:"🔬 Science"},
  {q:"What is the hardest natural substance on Earth?",a:"Diamond",w:["Granite","Quartz","Steel"],fact:"💎 Diamonds are pure carbon — the same atoms as pencil lead! Same stuff, totally different structure.",cat:"🔬 Science"},
  {q:"How many sides does a hexagon have?",a:"6",w:["5","7","8"],fact:"🐝 Honeycombs are made of hexagons — it's the most efficient shape for packing space with no gaps!",cat:"🔬 Science"},
  {q:"What do plants use to make their own food?",a:"Sunlight",w:["Soil","Rain","Wind"],fact:"🌱 Photosynthesis converts sunlight into sugar — and releases the oxygen we breathe as a bonus!",cat:"🔬 Science"},
  {q:"How many players are in a football (soccer) team on the pitch?",a:"11",w:["9","10","12"],fact:"⚽ That's 10 outfield players plus 1 goalkeeper — with up to 5 substitutes allowed in most competitions!",cat:"⚽ Sports"},
  {q:"Which sport uses a shuttlecock?",a:"Badminton",w:["Tennis","Squash","Pickleball"],fact:"🏸 A shuttlecock can travel over 200 mph when hit by pros — the fastest projectile in all of sport!",cat:"⚽ Sports"},
  {q:"How many rings are on the Olympic flag?",a:"5",w:["4","6","7"],fact:"🏅 The 5 rings represent 5 continents — and every national flag contains at least one ring colour!",cat:"⚽ Sports"},
  {q:"In football, what is it called when a player scores 3 goals in one match?",a:"Hat-trick",w:["Triple","Three-peat","Grand slam"],fact:"🎩 The term comes from cricket — a bowler who took 3 wickets in a row was given an actual hat!",cat:"⚽ Sports"},
  {q:"How high is a basketball hoop from the floor?",a:"10 feet",w:["8 feet","12 feet","9 feet"],fact:"🏀 The 10-foot height was set in 1891 when the inventor nailed a peach basket to a 10-foot track!",cat:"⚽ Sports"},
  {q:"Which country invented pizza?",a:"Italy",w:["USA","Greece","France"],fact:"🍕 Pizza was invented in Naples in the 1800s — now over 5 billion pizzas are sold worldwide every year!",cat:"🎨 Did You Know?"},
  {q:"Which is the tallest building in the world?",a:"Burj Khalifa",w:["Empire State Building","Eiffel Tower","Shanghai Tower"],fact:"🏙️ The Burj Khalifa in Dubai stands 828 metres tall — you can see it from 95 km away!",cat:"🎨 Did You Know?"},
  {q:"What is the most spoken language in the world?",a:"Mandarin Chinese",w:["English","Spanish","Hindi"],fact:"🗣️ Over 1 billion people speak Mandarin! English is second and Spanish third.",cat:"🎨 Did You Know?"},
  {q:"How many strings does a standard guitar have?",a:"6",w:["4","5","8"],fact:"🎸 A bass has 4, a standard guitar 6, but some pro players use 7 or even 8-string guitars!",cat:"🎨 Did You Know?"},
  {q:"How many keys does a standard piano have?",a:"88",w:["52","72","100"],fact:"🎹 A piano has 52 white keys and 36 black keys — totalling 88. Some concert grands have even more!",cat:"🎨 Did You Know?"},

  /* ── Animals: 20 more ── */
  {q:"What is a group of lions called?",a:"A Pride",w:["A Pack","A Herd","A Clan"],fact:"🦁 A pride usually has about 15 lions — mostly females who do the hunting, while males guard the territory!",cat:"🐾 Animals"},
  {q:"Which bird can fly backwards?",a:"Hummingbird",w:["Parrot","Swallow","Sparrow"],fact:"🐦 Hummingbirds beat their wings up to 80 times per SECOND — so fast they make a humming sound!",cat:"🐾 Animals"},
  {q:"What is a baby kangaroo called?",a:"Joey",w:["Cub","Kit","Foal"],fact:"🦘 A newborn joey is the size of a grape and crawls into its mother's pouch before it even has eyes!",cat:"🐾 Animals"},
  {q:"Which is the world's largest fish?",a:"Whale Shark",w:["Great White Shark","Manta Ray","Bluefin Tuna"],fact:"🦈 Whale sharks can grow 12 metres long — and despite their size they only eat tiny plankton!",cat:"🐾 Animals"},
  {q:"What colour is a polar bear's skin under its white fur?",a:"Black",w:["White","Pink","Grey"],fact:"🐻‍❄️ Polar bear fur is actually transparent hollow tubes, not white! The black skin underneath absorbs heat from sunlight.",cat:"🐾 Animals"},
  {q:"Which is the fastest bird in the world?",a:"Peregrine Falcon",w:["Golden Eagle","Spine-tailed Swift","Osprey"],fact:"🦅 A diving peregrine falcon reaches over 240 mph — faster than a Formula 1 car!",cat:"🐾 Animals"},
  {q:"Which bird cannot fly?",a:"Ostrich",w:["Flamingo","Pelican","Toucan"],fact:"🦚 Ostriches can't fly but they're incredibly fast runners — reaching 45 mph to escape predators!",cat:"🐾 Animals"},
  {q:"How many legs does a lobster have?",a:"10",w:["6","8","12"],fact:"🦞 Lobsters are decapods (deca = ten, pod = foot) — and remarkably, they taste with their legs!",cat:"🐾 Animals"},
  {q:"Which mammal lays eggs?",a:"Platypus",w:["Bat","Shrew","Hedgehog"],fact:"🦆 The platypus is one of only 5 egg-laying mammals — it also has venomous spurs on its hind legs!",cat:"🐾 Animals"},
  {q:"Which animal is believed to have the longest lifespan?",a:"Greenland Shark",w:["Giant Tortoise","Bowhead Whale","Giant Clam"],fact:"🦈 Greenland sharks can live over 400 years — one was estimated to be 512 years old, born before Shakespeare!",cat:"🐾 Animals"},
  {q:"Which animal can rotate its head nearly all the way around?",a:"Owl",w:["Parrot","Cat","Meerkat"],fact:"🦉 Owls can rotate their heads 270 degrees — so they can look almost all the way behind them without moving their body!",cat:"🐾 Animals"},
  {q:"What do you call a female deer?",a:"Doe",w:["Cow","Ewe","Vixen"],fact:"🦌 Female deer are does, males are bucks, and babies are fawns. A group of deer is called a herd!",cat:"🐾 Animals"},
  {q:"Which animal has the most powerful bite force?",a:"Nile Crocodile",w:["Great White Shark","Hyena","Jaguar"],fact:"🐊 A Nile crocodile's bite is 5,000 psi — about 10 times stronger than a great white shark!",cat:"🐾 Animals"},
  {q:"How long can a camel survive without water?",a:"Up to 2 weeks",w:["3 days","1 month","3 months"],fact:"🐪 Camels store FAT in their humps (not water!) — but they can still go without drinking for up to 2 weeks!",cat:"🐾 Animals"},
  {q:"Which is the largest primate in the world?",a:"Gorilla",w:["Orangutan","Chimpanzee","Baboon"],fact:"🦍 Male gorillas can weigh 200 kg and stand 1.8m tall — they're incredibly gentle giants despite their size!",cat:"🐾 Animals"},
  {q:"How many stomachs does a cow have?",a:"4",w:["1","2","3"],fact:"🐄 Cows have 4 stomach chambers to digest tough grass — they also chew the cud, bringing food back up to chew again!",cat:"🐾 Animals"},
  {q:"Which sea creature has no brain or heart?",a:"Jellyfish",w:["Sea Cucumber","Starfish","Sea Anemone"],fact:"🪼 Jellyfish have existed for 500 million years — even before dinosaurs — with no brain, heart, or bones!",cat:"🐾 Animals"},
  {q:"What is the name for a group of penguins in the water?",a:"A Raft",w:["A Flock","A Pod","A Colony"],fact:"🐧 On land, penguins live in a colony — but swimming together they're called a raft. Fancy names for fancy birds!",cat:"🐾 Animals"},
  {q:"Which insect can lift up to 50 times its own body weight?",a:"Ant",w:["Beetle","Grasshopper","Bee"],fact:"🐜 Ants are extraordinary weightlifters — some species can carry up to 50x their body weight. That's like you lifting a car!",cat:"🐾 Animals"},
  {q:"What is the name of the spots on a cheetah's coat?",a:"Solid spots",w:["Rosettes","Stripes","Patches"],fact:"🐆 Unlike leopards (which have rosette rings), cheetahs have solid black spots — and their famous black tear-line markings!",cat:"🐾 Animals"},

  /* ── Space: 15 more ── */
  {q:"What is the name of Earth's natural satellite?",a:"The Moon",w:["Titan","Europa","Phobos"],fact:"🌙 The Moon is slowly drifting away from Earth at 3.8 cm per year — the same speed your fingernails grow!",cat:"🚀 Space"},
  {q:"What is the name of the galaxy we live in?",a:"The Milky Way",w:["Andromeda","Triangulum","Sombrero"],fact:"🌌 The Milky Way has 200–400 billion stars — our Sun is just one ordinary star in the outer suburbs!",cat:"🚀 Space"},
  {q:"Which planet is known as the Red Planet?",a:"Mars",w:["Venus","Jupiter","Mercury"],fact:"🔴 Mars looks red because its soil is full of iron oxide — which is basically rust! The whole planet is rusty.",cat:"🚀 Space"},
  {q:"How many astronauts have walked on the Moon?",a:"12",w:["2","6","24"],fact:"👨‍🚀 Between 1969 and 1972, NASA's Apollo missions landed 6 times — 2 astronauts walked each time, giving 12 in total!",cat:"🚀 Space"},
  {q:"What do you call a massive explosion at the end of a giant star's life?",a:"Supernova",w:["Black Hole","Nebula","Pulsar"],fact:"💥 A supernova can briefly outshine an entire galaxy of 100 billion stars — visible millions of light-years away!",cat:"🚀 Space"},

let gameQuestions = [];
let currentQ = 0;
let score = 0;
let answered = false;
let resultLog = [];
let advanceTimer = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function startGame() {
  gameQuestions = shuffle(QUESTIONS).slice(0, 10);
  currentQ = 0;
  score = 0;
  answered = false;
  resultLog = [];
  if (advanceTimer) clearTimeout(advanceTimer);

  document.getElementById('end-card').classList.remove('show');
  document.getElementById('game-area').style.display = 'block';
  document.getElementById('score-pill').textContent = 'Score: 0';

  renderQuestion();
}

function renderDots() {
  const container = document.getElementById('progress-dots');
  container.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentQ ? ' done' : i === currentQ ? ' current' : '');
    container.appendChild(d);
  }
}

function renderQuestion() {
  answered = false;
  renderDots();

  const q = gameQuestions[currentQ];
  const catBadge = document.getElementById('cat-badge');
  catBadge.textContent = q.cat;
  catBadge.style.background = (CAT_COLORS[q.cat] || '#555') + '33';
  catBadge.style.color = CAT_COLORS[q.cat] || '#aaa';
  catBadge.style.border = '1px solid ' + (CAT_COLORS[q.cat] || '#555') + '66';

  document.getElementById('question-text').textContent = q.q;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback hidden';
  fb.textContent = '';

  const wf = document.getElementById('wow-fact');
  wf.className = 'wow-fact hidden';
  wf.textContent = '';

  const options = shuffle([q.a, ...q.w]);
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(opt, q));
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen, q) {
  if (answered) return;
  answered = true;

  const isCorrect = chosen === q.a;
  if (isCorrect) score++;

  document.getElementById('score-pill').textContent = 'Score: ' + score;
  resultLog.push(isCorrect);

  const buttons = document.querySelectorAll('.opt-btn');
  buttons.forEach(btn => {
    btn.disabled = true;
    const text = btn.textContent;
    if (text === q.a) {
      btn.classList.add('correct');
    } else if (text === chosen && !isCorrect) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dim');
    }
  });

  const fb = document.getElementById('feedback');
  const wf = document.getElementById('wow-fact');

  if (isCorrect) {
    fb.textContent = pick(CORRECT_MSGS);
    fb.className = 'feedback correct-fb';
  } else {
    const msg = pick(WRONG_MSGS).replace('{a}', q.a);
    fb.textContent = msg;
    fb.className = 'feedback wrong-fb';
  }

  wf.textContent = '💡 WOW Fact: ' + q.fact;
  wf.className = 'wow-fact';

  advanceTimer = setTimeout(() => {
    currentQ++;
    if (currentQ >= 10) {
      showEnd();
    } else {
      renderQuestion();
    }
  }, 2600);
}

function showEnd() {
  document.getElementById('game-area').style.display = 'none';
  const ec = document.getElementById('end-card');
  ec.classList.add('show');

  document.getElementById('end-score').textContent = score;
  document.getElementById('end-score').style.color = END_MSGS[score].color;

  const msg = document.getElementById('end-msg');
  msg.textContent = END_MSGS[score].text;
  msg.style.color = END_MSGS[score].color;

  const rd = document.getElementById('result-dots');
  rd.innerHTML = '';
  resultLog.forEach((r, i) => {
    const dot = document.createElement('div');
    dot.className = 'r-dot ' + (r ? 'c' : 'w');
    dot.textContent = r ? '✓' : '✗';
    rd.appendChild(dot);
  });
}

startGame();
</script>
</body>
</html>
