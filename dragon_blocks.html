<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragonia — Dragon Blocks</title>
<style>
/* ── Dragonia variables ─────────────────────────────────────────────── */
:root {
  --bg:#0a0a14; --surface:#0f0f1e; --card:#131325; --hover:#1a1a35;
  --accent:#ff6b1a; --gold:#f5a623; --text:#f0ede6; --sub:#a89880;
  --muted:#5c5248; --border:#1e1a2e;
  --scale-line: rgba(245,166,35,.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Body — dragon scale background ────────────────────────────────── */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 65% 32% at 50% -4%,  rgba(245,107,26,.18) 0%, transparent 70%),
    radial-gradient(ellipse 48% 26% at 92% 105%, rgba(192,57,43,.14)  0%, transparent 65%),
    repeating-linear-gradient( 60deg, var(--scale-line) 0, var(--scale-line) 1px, transparent 1px, transparent 28px),
    repeating-linear-gradient(-60deg, var(--scale-line) 0, var(--scale-line) 1px, transparent 1px, transparent 28px);
  color: var(--text);
  min-height: 100vh;
  padding: 16px 16px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

a { color: var(--sub); text-decoration: none; transition: color .15s; }
a:hover { color: var(--text); }

.wrap { width: 100%; max-width: 480px; }

/* ── Header ─────────────────────────────────────────────────────────── */
.game-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 16px;
}
.back-btn {
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  transition: color .15s;
}
.back-btn:hover { color: var(--sub); }
.header-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--accent);
  flex: 1;
  text-align: center;
}
.level-pill {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px 10px;
  white-space: nowrap;
}
.pause-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  padding: 3px 8px;
  cursor: pointer;
  line-height: 1;
  transition: border-color .15s;
}
.pause-btn:hover { border-color: var(--accent); }

/* ── Game layout ────────────────────────────────────────────────────── */
.game-layout {
  position: relative;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

/* Board wrapper — overlays sit inside this */
.board-wrap {
  position: relative;
  flex-shrink: 0;
}

#board {
  display: block;
  background: #050509;
  border: 1px solid var(--border);
  border-radius: 4px;
}

/* ── Side panel ─────────────────────────────────────────────────────── */
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 130px;
  flex-shrink: 0;
}
.panel-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 10px;
  text-align: center;
}
.panel-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}
.panel-value {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}
.panel-value.gold { color: var(--gold); }
.next-box { padding: 10px 8px; }
#next-canvas {
  display: block;
  margin: 0 auto;
}

/* ── Overlays (over board-wrap) ─────────────────────────────────────── */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(8, 8, 18, 0.93);
  backdrop-filter: blur(6px);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border-radius: 4px;
  padding: 20px 16px;
  text-align: center;
  z-index: 10;
}
.overlay.active { display: flex; }

.ov-emoji { font-size: 48px; line-height: 1; }
.ov-title {
  font-size: 21px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.ov-sub {
  font-size: 12px;
  color: var(--sub);
  line-height: 1.6;
  max-width: 200px;
}
.ov-score-label {
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}
.ov-score {
  font-size: 32px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
}
.ov-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  padding: 11px 28px;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: 2px;
}
.ov-btn:hover { opacity: .85; }

/* Rules table inside splash */
.ov-rules {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 12px;
  color: var(--sub);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  width: 100%;
  max-width: 200px;
}
.ov-rules-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
}
.ov-rules-key {
  color: var(--gold);
  font-weight: 700;
  font-family: 'Courier New', monospace;
  font-size: 11px;
}
.ov-pieces {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 2px;
}
.piece-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

/* ── Mobile controls ────────────────────────────────────────────────── */
.mobile-controls {
  display: none;
  gap: 8px;
  margin-top: 12px;
  width: 100%;
  max-width: 480px;
  justify-content: center;
}
.ctrl-btn {
  flex: 1;
  max-width: 100px;
  min-height: 62px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 24px;
  cursor: pointer;
  transition: background .1s, border-color .1s, transform .08s;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
.ctrl-btn:active {
  background: var(--hover);
  border-color: var(--accent);
  transform: scale(.93);
}

/* ── Responsive ─────────────────────────────────────────────────────── */
@media (max-width: 540px) {
  body { padding: 12px 12px 40px; }

  .game-layout {
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .board-wrap { width: 100%; }
  #board { border-radius: 6px; }

  /* Side panel becomes horizontal info bar */
  .side-panel {
    flex-direction: row;
    width: 100%;
    gap: 8px;
  }
  .panel-box { flex: 1; padding: 8px 6px; }
  .panel-value { font-size: 17px; }
  .next-box { flex: 1; }

  .mobile-controls { display: flex; }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header class="game-header">
    <a href="adventure-games.html" class="back-btn">← Dragonia</a>
    <div class="header-title">🐉 Dragon Blocks</div>
    <div class="level-pill">Lvl <span id="lvl-disp">1</span></div>
    <button class="pause-btn" id="btn-pause" aria-label="Pause/Resume">⏸</button>
  </header>

  <!-- Game area -->
  <div class="game-layout">

    <!-- Board + overlays -->
    <div class="board-wrap" id="board-wrap">
      <canvas id="board"></canvas>

      <!-- Splash -->
      <div id="ov-splash" class="overlay active">
        <div class="ov-emoji">🐉</div>
        <div class="ov-title">Dragon Blocks</div>
        <div class="ov-sub">Seven dragon pieces. Stack them, clear lines, survive as long as you can.</div>
        <div class="ov-rules">
          <div class="ov-rules-row"><span>Move</span><span class="ov-rules-key">← →</span></div>
          <div class="ov-rules-row"><span>Rotate</span><span class="ov-rules-key">↑</span></div>
          <div class="ov-rules-row"><span>Soft drop</span><span class="ov-rules-key">↓</span></div>
          <div class="ov-rules-row"><span>Hard drop</span><span class="ov-rules-key">Space</span></div>
          <div class="ov-rules-row"><span>Pause</span><span class="ov-rules-key">P</span></div>
        </div>
        <div class="ov-pieces" id="piece-palette"></div>
        <button class="ov-btn" id="btn-start">Start Game</button>
      </div>

      <!-- Pause -->
      <div id="ov-pause" class="overlay">
        <div class="ov-emoji">⏸</div>
        <div class="ov-title">Paused</div>
        <div class="ov-sub">Press P or tap Resume to continue.</div>
        <button class="ov-btn" id="btn-resume">Resume</button>
      </div>

      <!-- Game Over -->
      <div id="ov-over" class="overlay">
        <div class="ov-emoji">🔥</div>
        <div class="ov-title">Realm Overflowed</div>
        <div class="ov-score-label">Final Score</div>
        <div class="ov-score" id="final-score">0</div>
        <button class="ov-btn" id="btn-again">Play Again</button>
      </div>
    </div><!-- /board-wrap -->

    <!-- Side panel -->
    <div class="side-panel">
      <div class="panel-box">
        <div class="panel-label">Score</div>
        <div class="panel-value gold" id="score-disp">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">Lines</div>
        <div class="panel-value" id="lines-disp">0</div>
      </div>
      <div class="panel-box next-box">
        <div class="panel-label">Next</div>
        <canvas id="next-canvas"></canvas>
      </div>
    </div>

  </div><!-- /game-layout -->

  <!-- Mobile controls -->
  <div class="mobile-controls">
    <button class="ctrl-btn" id="m-left"  aria-label="Move left">◀</button>
    <button class="ctrl-btn" id="m-rot"   aria-label="Rotate">↻</button>
    <button class="ctrl-btn" id="m-right" aria-label="Move right">▶</button>
    <button class="ctrl-btn" id="m-drop"  aria-label="Hard drop" style="font-size:18px;">▼▼</button>
  </div>

</div><!-- /wrap -->

<script>
// ═══════════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════════
const COLS = 10, ROWS = 20;

// Score for 1/2/3/4 lines cleared (multiplied by level)
const SCORE_TABLE = [0, 100, 300, 500, 800];

// The 7 dragon tetrominoes
const PIECES = [
  { shape: [[1,1,1,1]],        color: '#ff6b1a', name: 'Fire Wyvern'    }, // I
  { shape: [[1,1],[1,1]],      color: '#f5d769', name: 'Dragon Egg'     }, // O
  { shape: [[0,1,0],[1,1,1]],  color: '#c084fc', name: 'Thunder Drake'  }, // T
  { shape: [[0,1,1],[1,1,0]],  color: '#4ade80', name: 'Forest Serpent' }, // S
  { shape: [[1,1,0],[0,1,1]],  color: '#f87171', name: 'Inferno Drake'  }, // Z
  { shape: [[1,0,0],[1,1,1]],  color: '#60a5fa', name: 'Frost Drake'    }, // J
  { shape: [[0,0,1],[1,1,1]],  color: '#fbbf24', name: 'Storm Wyrm'     }, // L
];

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let boardCanvas, nextCanvas, boardCtx, nextCtx;
let BS = 30;        // block size in px (set by initSize)
let NBS = 24;       // block size for next-piece preview
let board;          // ROWS × COLS: null | color-string
let cur, nextPiece; // current and next tetromino objects
let score, lines, level;
let gameState;      // 'idle' | 'playing' | 'paused' | 'over'
let dropAccum, lastTime, dropInterval;
let rafId = null;
let bag = [];       // 7-bag randomiser

// ═══════════════════════════════════════════════════════════════════════
// RESPONSIVE SIZING
// ═══════════════════════════════════════════════════════════════════════
function initSize() {
  const vw = window.innerWidth;
  if (vw < 540) {
    // Mobile: fit board in available width (body padding = 24px total)
    BS = Math.max(20, Math.min(32, Math.floor((vw - 24) / COLS)));
  } else {
    BS = 30;
  }
  NBS = Math.max(16, Math.floor(BS * 0.8));

  boardCanvas.width  = COLS * BS;
  boardCanvas.height = ROWS * BS;
  nextCanvas.width   = 4 * NBS;
  nextCanvas.height  = 3 * NBS;

  if (gameState === 'playing' || gameState === 'paused') {
    render();
    drawNext();
  } else if (gameState === 'idle') {
    drawEmptyBoard();
  }
}

// ═══════════════════════════════════════════════════════════════════════
// 7-BAG RANDOMISER
// ═══════════════════════════════════════════════════════════════════════
function refillBag() {
  bag = [0, 1, 2, 3, 4, 5, 6];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
}

function popBag() {
  if (!bag.length) refillBag();
  return bag.pop();
}

// ═══════════════════════════════════════════════════════════════════════
// PIECE HELPERS
// ═══════════════════════════════════════════════════════════════════════
function makePiece(idx) {
  const p = PIECES[idx];
  const shape = p.shape.map(r => [...r]);
  // Spawn centred at top
  const col = Math.floor((COLS - shape[0].length) / 2);
  return { shape, color: p.color, name: p.name, row: -1, col };
}

function rotate90(shape) {
  // Clockwise: transpose then reverse each row
  const R = shape.length, C = shape[0].length;
  const out = [];
  for (let c = 0; c < C; c++) {
    out.push([]);
    for (let r = R - 1; r >= 0; r--) out[c].push(shape[r][c]);
  }
  return out;
}

function collision(shape, row, col) {
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const br = row + r, bc = col + c;
      if (br >= ROWS) return true;
      if (bc < 0 || bc >= COLS) return true;
      if (br >= 0 && board[br][bc] !== null) return true;
    }
  }
  return false;
}

function ghostRow() {
  let r = cur.row;
  while (!collision(cur.shape, r + 1, cur.col)) r++;
  return r;
}

function tryRotate() {
  const ns = rotate90(cur.shape);
  // Wall-kick offsets to try
  for (const kick of [0, -1, 1, -2, 2]) {
    if (!collision(ns, cur.row, cur.col + kick)) {
      cur.shape = ns;
      cur.col  += kick;
      return;
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// LOCK, LINE CLEAR, SPAWN
// ═══════════════════════════════════════════════════════════════════════
function lockPiece() {
  for (let r = 0; r < cur.shape.length; r++) {
    for (let c = 0; c < cur.shape[r].length; c++) {
      if (!cur.shape[r][c]) continue;
      const br = cur.row + r;
      if (br < 0) { triggerGameOver(); return; }
      board[br][cur.col + c] = cur.color;
    }
  }
  clearLines();
  if (gameState === 'playing') spawnNext();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== null)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(null));
      cleared++;
      r++; // re-examine same index
    }
  }
  if (cleared > 0) {
    score += SCORE_TABLE[Math.min(cleared, 4)] * level;
    lines += cleared;
    const newLevel = Math.floor(lines / 10) + 1;
    if (newLevel !== level) {
      level = newLevel;
      dropInterval = Math.max(80, 800 - (level - 1) * 72);
      document.getElementById('lvl-disp').textContent = level;
    }
    updateUI();
  }
}

function spawnNext() {
  cur = nextPiece;
  nextPiece = makePiece(popBag());
  drawNext();
  // Check immediate collision → game over
  if (collision(cur.shape, cur.row, cur.col)) {
    // Try one row above
    cur.row--;
    if (collision(cur.shape, cur.row, cur.col)) {
      triggerGameOver();
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// NEW GAME / GAME OVER
// ═══════════════════════════════════════════════════════════════════════
function newGame() {
  board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  score = 0; lines = 0; level = 1;
  dropInterval = 800;
  dropAccum = 0;
  lastTime = null;
  bag = [];
  document.getElementById('lvl-disp').textContent = 1;
  refillBag();
  nextPiece = makePiece(popBag());
  spawnNext();
  if (gameState === 'over' || gameState === 'idle') {
    gameState = 'playing';
  } else {
    gameState = 'playing';
  }
  hideAllOverlays();
  updateUI();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

function triggerGameOver() {
  gameState = 'over';
  document.getElementById('final-score').textContent = score.toLocaleString();
  showOverlay('ov-over');
  if (rafId) cancelAnimationFrame(rafId);
}

// ═══════════════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════════════
function loop(ts) {
  if (gameState !== 'playing') return;
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 200); // cap dt to avoid huge jumps
  lastTime = ts;

  dropAccum += dt;
  if (dropAccum >= dropInterval) {
    dropAccum -= dropInterval;
    if (!collision(cur.shape, cur.row + 1, cur.col)) {
      cur.row++;
    } else {
      lockPiece();
      if (gameState !== 'playing') return;
    }
  }
  render();
  rafId = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════════
function drawCell(ctx, px, py, color, alpha, blockSize) {
  const s = blockSize || BS;
  ctx.globalAlpha = alpha != null ? alpha : 1;

  // Base colour
  ctx.fillStyle = color;
  ctx.fillRect(px, py, s, s);

  // Top + left highlight
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fillRect(px,         py,         s, Math.max(2, s * 0.1));
  ctx.fillRect(px,         py,         Math.max(2, s * 0.1), s);

  // Bottom + right shadow
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.fillRect(px, py + s - Math.max(2, s * 0.1), s, Math.max(2, s * 0.1));
  ctx.fillRect(px + s - Math.max(2, s * 0.1), py, Math.max(2, s * 0.1), s);

  // Dragon scales — 3-arc triangular arrangement
  if (s >= 14) {
    const rx = s * 0.28, ry = s * 0.18;
    ctx.strokeStyle = 'rgba(255,255,255,0.28)';
    ctx.lineWidth = 1;

    // Upper-left scale
    ctx.beginPath();
    ctx.ellipse(px + s * 0.30, py + s * 0.44, rx, ry, 0, Math.PI, 0);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.09)';
    ctx.fill(); ctx.stroke();

    // Upper-right scale
    ctx.beginPath();
    ctx.ellipse(px + s * 0.70, py + s * 0.44, rx, ry, 0, Math.PI, 0);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.09)';
    ctx.fill(); ctx.stroke();

    // Bottom-centre scale
    ctx.beginPath();
    ctx.ellipse(px + s * 0.50, py + s * 0.70, rx, ry, 0, Math.PI, 0);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.09)';
    ctx.fill(); ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

function getHeadCell(shape) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) return { r, c };
  return { r: 0, c: 0 };
}

function drawEye(ctx, px, py, color, s) {
  const ecx = px + s * 0.50, ecy = py + s * 0.45;
  const prev = ctx.globalAlpha;
  ctx.globalAlpha = 1;

  // Sclera
  ctx.beginPath();
  ctx.ellipse(ecx, ecy, s*0.18, s*0.13, 0, 0, Math.PI*2);
  ctx.fillStyle = '#f5f0e8'; ctx.fill();

  // Iris (amber)
  ctx.beginPath();
  ctx.ellipse(ecx, ecy, s*0.13, s*0.10, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fbbf24'; ctx.fill();

  // Pupil (vertical slit)
  ctx.beginPath();
  ctx.ellipse(ecx, ecy, s*0.04, s*0.09, 0, 0, Math.PI*2);
  ctx.fillStyle = '#0d0a05'; ctx.fill();

  // Specular highlight
  ctx.beginPath();
  ctx.arc(ecx + s*0.05, ecy - s*0.04, Math.max(0.8, s*0.03), 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.90)'; ctx.fill();

  // Brow ridge
  ctx.beginPath();
  ctx.arc(ecx, ecy - s*0.13, s*0.14, Math.PI+0.3, -0.3, false);
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = Math.max(1, s*0.06);
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.globalAlpha = prev;
}

function drawEmptyBoard() {
  boardCtx.fillStyle = '#050509';
  boardCtx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
  // Grid lines
  boardCtx.strokeStyle = 'rgba(255,255,255,0.025)';
  boardCtx.lineWidth = 1;
  for (let c = 1; c < COLS; c++) {
    boardCtx.beginPath();
    boardCtx.moveTo(c * BS + 0.5, 0);
    boardCtx.lineTo(c * BS + 0.5, ROWS * BS);
    boardCtx.stroke();
  }
  for (let r = 1; r < ROWS; r++) {
    boardCtx.beginPath();
    boardCtx.moveTo(0, r * BS + 0.5);
    boardCtx.lineTo(COLS * BS, r * BS + 0.5);
    boardCtx.stroke();
  }
}

function render() {
  drawEmptyBoard();

  // Locked cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawCell(boardCtx, c * BS, r * BS, board[r][c]);
    }
  }

  // Ghost piece
  const gr = ghostRow();
  for (let r = 0; r < cur.shape.length; r++) {
    for (let c = 0; c < cur.shape[r].length; c++) {
      if (!cur.shape[r][c]) continue;
      const br = gr + r, bc = cur.col + c;
      if (br >= 0 && br < ROWS) drawCell(boardCtx, bc * BS, br * BS, cur.color, 0.20);
    }
  }

  // Current piece — with colour glow
  boardCtx.shadowColor = cur.color;
  boardCtx.shadowBlur  = 10;
  for (let r = 0; r < cur.shape.length; r++) {
    for (let c = 0; c < cur.shape[r].length; c++) {
      if (!cur.shape[r][c]) continue;
      const br = cur.row + r, bc = cur.col + c;
      if (br >= 0 && br < ROWS) drawCell(boardCtx, bc * BS, br * BS, cur.color);
    }
  }
  boardCtx.shadowBlur = 0; // must clear — shadowBlur persists across frames

  // Dragon eye on head cell
  const head = getHeadCell(cur.shape);
  const eyeBr = cur.row + head.r, eyeBc = cur.col + head.c;
  if (eyeBr >= 0 && eyeBr < ROWS) {
    drawEye(boardCtx, eyeBc * BS, eyeBr * BS, cur.color, BS);
  }
}

function drawNext() {
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  const sh = nextPiece.shape;
  const offC = Math.floor((4 - sh[0].length) / 2);
  const offR = Math.floor((3 - sh.length) / 2);
  for (let r = 0; r < sh.length; r++) {
    for (let c = 0; c < sh[r].length; c++) {
      if (!sh[r][c]) continue;
      drawCell(nextCtx, (offC + c) * NBS, (offR + r) * NBS, nextPiece.color, 1, NBS);
    }
  }
  // Dragon eye on head cell of next piece
  const head = getHeadCell(nextPiece.shape);
  drawEye(nextCtx, (offC + head.c) * NBS, (offR + head.r) * NBS, nextPiece.color, NBS);
}

// ═══════════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════════
function updateUI() {
  document.getElementById('score-disp').textContent = score.toLocaleString();
  document.getElementById('lines-disp').textContent = lines;
}

function showOverlay(id) {
  document.querySelectorAll('.overlay').forEach(el => {
    el.classList.toggle('active', el.id === id);
  });
}

function hideAllOverlays() {
  document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
}

// Draw coloured dots on splash to show the 7 dragon piece colours
function renderPiecePalette() {
  const wrap = document.getElementById('piece-palette');
  PIECES.forEach(p => {
    const dot = document.createElement('div');
    dot.className = 'piece-dot';
    dot.style.background = p.color;
    dot.title = p.name;
    wrap.appendChild(dot);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// PLAYER ACTIONS
// ═══════════════════════════════════════════════════════════════════════
function doMoveLeft() {
  if (gameState !== 'playing') return;
  if (!collision(cur.shape, cur.row, cur.col - 1)) cur.col--;
}

function doMoveRight() {
  if (gameState !== 'playing') return;
  if (!collision(cur.shape, cur.row, cur.col + 1)) cur.col++;
}

function doRotate() {
  if (gameState !== 'playing') return;
  tryRotate();
}

function doSoftDrop() {
  if (gameState !== 'playing') return;
  if (!collision(cur.shape, cur.row + 1, cur.col)) {
    cur.row++;
    score += 1;
    dropAccum = 0;
    updateUI();
  }
}

function doHardDrop() {
  if (gameState !== 'playing') return;
  const gr = ghostRow();
  const dist = gr - cur.row;
  score += dist * 2;
  cur.row = gr;
  lockPiece();
  if (gameState === 'playing') updateUI();
}

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    if (rafId) cancelAnimationFrame(rafId);
    showOverlay('ov-pause');
  } else if (gameState === 'paused') {
    gameState = 'playing';
    lastTime = null;
    hideAllOverlays();
    rafId = requestAnimationFrame(loop);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  switch (e.code) {
    case 'ArrowLeft':  e.preventDefault(); doMoveLeft();  break;
    case 'ArrowRight': e.preventDefault(); doMoveRight(); break;
    case 'ArrowUp':    e.preventDefault(); doRotate();    break;
    case 'ArrowDown':  e.preventDefault(); doSoftDrop();  break;
    case 'Space':      e.preventDefault(); doHardDrop();  break;
    case 'KeyP':                           togglePause(); break;
  }
});

// ═══════════════════════════════════════════════════════════════════════
// MOBILE BUTTON WITH AUTO-REPEAT
// ═══════════════════════════════════════════════════════════════════════
function bindButton(id, fn) {
  const el = document.getElementById(id);
  let holdTimeout = null, holdInterval = null;

  function stop() {
    clearTimeout(holdTimeout);
    clearInterval(holdInterval);
    holdTimeout = null;
    holdInterval = null;
  }

  function start(e) {
    e.preventDefault();
    fn();
    holdTimeout = setTimeout(() => {
      holdInterval = setInterval(fn, 75);
    }, 280);
  }

  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend',   stop,  { passive: false });
  el.addEventListener('touchcancel',stop,  { passive: false });
  // Mouse fallback (desktop testing)
  el.addEventListener('mousedown', e => fn());
}

// ═══════════════════════════════════════════════════════════════════════
// TOUCH SWIPE ON CANVAS
// ═══════════════════════════════════════════════════════════════════════
function initTouchSwipe() {
  let tx, ty;
  boardCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, { passive: false });

  boardCanvas.addEventListener('touchend', e => {
    e.preventDefault();
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const threshold = BS * 0.7;
    if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) {
      doRotate(); // tap = rotate
    } else if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > threshold) doMoveRight(); else doMoveLeft();
    } else {
      if (dy > threshold * 1.5) doHardDrop();
      else if (dy > 0) doSoftDrop();
    }
  }, { passive: false });
}

// ═══════════════════════════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  boardCanvas = document.getElementById('board');
  nextCanvas  = document.getElementById('next-canvas');
  boardCtx    = boardCanvas.getContext('2d');
  nextCtx     = nextCanvas.getContext('2d');

  gameState = 'idle';
  initSize();
  drawEmptyBoard();
  renderPiecePalette();

  // Overlay buttons
  document.getElementById('btn-start').addEventListener('click',  newGame);
  document.getElementById('btn-resume').addEventListener('click', togglePause);
  document.getElementById('btn-again').addEventListener('click',  newGame);
  document.getElementById('btn-pause').addEventListener('click',  togglePause);

  // Mobile buttons
  bindButton('m-left',  doMoveLeft);
  bindButton('m-rot',   doRotate);
  bindButton('m-right', doMoveRight);
  bindButton('m-drop',  doHardDrop);

  // Touch swipe
  initTouchSwipe();

  // Responsive resize (debounced)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(initSize, 120);
  });
});
</script>
